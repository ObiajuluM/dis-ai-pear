<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Body -->
  <ellipse cx="50" cy="82" rx="38" ry="37" fill="#cefc00"/>
  <!-- Upper bulge -->
  <ellipse cx="50" cy="48" rx="21" ry="24" fill="#c1ed00"/>
  <!-- Stem -->
  <path d="M50 24 C50 13, 59 7, 64 4" stroke="#455600" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Leaf -->
  <path d="M57 18 C67 10, 77 15, 71 24 C65 28, 55 25, 57 18Z" fill="#4f6300"/>
  <!-- Shine -->
  <ellipse cx="39" cy="44" rx="6" ry="8" fill="white" opacity="0.3"/>
  <!-- Angry left eyebrow -->
  <path d="M27 57 L41 63" stroke="#2a3800" stroke-width="4" stroke-linecap="round"/>
  <!-- Angry right eyebrow -->
  <path d="M59 63 L73 57" stroke="#2a3800" stroke-width="4" stroke-linecap="round"/>
  <!-- Left eye -->
  <ellipse cx="35" cy="69" rx="5.5" ry="5" fill="#2a3800"/>
  <ellipse cx="37" cy="67" rx="1.8" ry="1.8" fill="white" opacity="0.5"/>
  <!-- Right eye -->
  <ellipse cx="65" cy="69" rx="5.5" ry="5" fill="#2a3800"/>
  <ellipse cx="67" cy="67" rx="1.8" ry="1.8" fill="white" opacity="0.5"/>
  <!-- Furrowed brow crease -->
  <path d="M43 63 L50 67 L57 63" stroke="#2a3800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
  <!-- Angry frown -->
  <path d="M36 88 Q50 79 64 88" stroke="#2a3800" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Gritted teeth marks -->
  <path d="M40 87 L40 90 M46 85 L46 88 M52 84 L52 87 M58 85 L58 88" stroke="#2a3800" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
